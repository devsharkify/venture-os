<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Venture OS">
  <title>Venture OS</title>
  <!-- Background -->
  <rect width="200" height="200" rx="36" fill="#2D7AFF"/>
  <!-- Terminal chevron: > -->
  <path d="M 40 60 L 100 100 L 40 140" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
